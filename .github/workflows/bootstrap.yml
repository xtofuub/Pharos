name: Bootstrap Pharos source

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore source tree
        shell: bash
        run: |
          cat .bootstrap/part* > /tmp/pharos-source.tar.xz
          tar -xJf /tmp/pharos-source.tar.xz -C .
          sed -i '1s/^# BreachLens$/# Pharos/' README.md
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/bootstrap-trigger.txt

      - name: Commit source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Pharos source and Windows build workflow"
          git push origin main

      - name: Trigger Windows build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            gh workflow run build.yml --ref main && exit 0
            sleep 3
          done
          exit 1
