name: Build Windows EXE
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-windows:
    name: Build Pharos.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        working-directory: backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" "pyinstaller>=6.10,<7"
      - name: Run tests
        working-directory: backend
        run: python -m pytest -q
      - name: Build executable
        working-directory: backend
        run: python -m PyInstaller breachelens.spec --noconfirm --clean
      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "backend/dist/Pharos.exe"
          if (-not (Test-Path $exe)) { throw "Pharos.exe was not created" }
          if ((Get-Item $exe).Length -lt 1MB) { throw "Pharos.exe is unexpectedly small" }
          Get-FileHash $exe -Algorithm SHA256
      - uses: actions/upload-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: backend/dist/Pharos.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/Pharos.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
