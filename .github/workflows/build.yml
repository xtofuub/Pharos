name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Pharos.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Apply staged source improvements
        if: ${{ hashFiles('.github/pharos-patch/part*') != '' }}
        shell: pwsh
        run: |
          $parts = Get-ChildItem ".github/pharos-patch/part*" | Sort-Object Name
          $encoded = ($parts | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          $gzipPath = Join-Path $env:RUNNER_TEMP "pharos-improvements.patch.gz"
          $patchPath = Join-Path $env:RUNNER_TEMP "pharos-improvements.patch"
          [System.IO.File]::WriteAllBytes($gzipPath, [Convert]::FromBase64String($encoded))
          python -c "import gzip,pathlib,sys; pathlib.Path(sys.argv[2]).write_bytes(gzip.decompress(pathlib.Path(sys.argv[1]).read_bytes()))" $gzipPath $patchPath
          git apply --check $patchPath
          git apply $patchPath
          Remove-Item ".github/pharos-patch" -Recurse -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix folder scanning and indexing"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pyinstaller

      - name: Run tests
        working-directory: backend
        run: python -m pytest -q

      - name: Build executable
        working-directory: backend
        run: python -m PyInstaller breachelens.spec --noconfirm --clean

      - name: Verify Pharos executable
        shell: pwsh
        run: |
          $target = "backend/dist/Pharos.exe"
          if (-not (Test-Path $target)) {
            throw "Pharos.exe was not created"
          }
          $size = (Get-Item $target).Length
          if ($size -lt 1MB) {
            throw "Pharos.exe looks unexpectedly small: $size bytes"
          }
          Get-FileHash $target -Algorithm SHA256

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: backend/dist/Pharos.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built executable
        uses: actions/download-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: release

      - name: Attach executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Pharos.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
