name: Build Windows EXE

on:
  push:
    branches: [main, pharos-0.3]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-source:
    name: Prepare source tree
    runs-on: ubuntu-latest
    outputs:
      had_payload: ${{ steps.detect.outputs.had_payload }}
    steps:
      - name: Check out branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Detect bootstrap payload
        id: detect
        shell: bash
        run: |
          if compgen -G '.pharos-bootstrap/part*' > /dev/null; then
            echo "had_payload=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_payload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode and verify payload
        if: steps.detect.outputs.had_payload == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .pharos-bootstrap/part* | base64 --decode > /tmp/pharos-0.3.tar.xz
          xz --test /tmp/pharos-0.3.tar.xz
          ls -lh /tmp/pharos-0.3.tar.xz

      - name: Expand source tree
        if: steps.detect.outputs.had_payload == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tar -xJf /tmp/pharos-0.3.tar.xz -C .
          rm -rf .pharos-bootstrap
          test -f backend/breachelens/identities.py
          test -f backend/migrations/002_pharos_03.sql

      - name: Commit expanded source
        if: github.event_name == 'push' && steps.detect.outputs.had_payload == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Pharos 0.3 identity profiles and reliable indexing"
          git push origin HEAD:${{ github.ref_name }}

  build-windows:
    name: Build Pharos.exe
    needs: prepare-source
    if: github.event_name == 'push' || needs.prepare-source.outputs.had_payload == 'false'
    runs-on: windows-latest
    steps:
      - name: Check out prepared source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pyinstaller

      - name: Run tests
        working-directory: backend
        run: python -m pytest -q

      - name: Build executable
        working-directory: backend
        run: python -m PyInstaller breachelens.spec --noconfirm --clean

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "backend/dist/Pharos.exe"
          if (-not (Test-Path $exe)) {
            throw "Pharos.exe was not created"
          }
          $size = (Get-Item $exe).Length
          if ($size -lt 1MB) {
            throw "Pharos.exe looks unexpectedly small: $size bytes"
          }
          Get-FileHash $exe -Algorithm SHA256

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: backend/dist/Pharos.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  publish-release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built executable
        uses: actions/download-artifact@v4
        with:
          name: Pharos-Windows-${{ github.sha }}
          path: release
      - name: Attach executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Pharos.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
